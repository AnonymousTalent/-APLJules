1️⃣ Combinator Engine（排列組合）

from itertools import permutations, combinations

def generate_plans(subtasks):
    plans = []

    # 🔹排列（順序不同）
    for p in permutations(subtasks):
        plans.append({
            "type": "permutation",
            "plan": list(p)
        })

    return plans


---

2️⃣ Plan Scorer（評分系統）

def score_plan(plan):
    score = 0

    for task in plan["plan"]:
        if "API" in task["task"]:
            score += 3
        if "UI" in task["task"]:
            score += 2
        if "test" in task["task"]:
            score += 1

    return score


---

3️⃣ Best Plan Selector

def select_best(plans):
    scored = []

    for p in plans:
        scored.append((score_plan(p), p))

    scored.sort(reverse=True, key=lambda x: x[0])

    return scored[0][1]


