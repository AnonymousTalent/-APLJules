import time
import threading
import json
from core.decomposer import decompose_task
from core.scheduler import schedule_tasks
from core.pricing import calculate_dynamic_price

# 全局事件鎖，防止多線程同時寫入
_stop_event = threading.Event()

def ai_perception_loop(app_state):
    """
    模擬 AI 自主感知外部世界。
    如果偵測到「異常」或「條件觸發」，就會自動生成並執行任務。
    """
    counter = 0
    while not _stop_event.is_set():
        time.sleep(10) # 每 10 秒掃描一次
        counter += 1
        
        # 模擬感知：每 30 秒發現一次新任務（測試用）
        if counter % 3 == 0:
            print("[AI 感知器] 偵測到外部環境變化！自動生成技術維護任務...")
            
            # 生成虛擬感知數據
            fake_payload = {
                "title": "AI 自主偵測：系統每日健康檢查與優化",
                "body": "根據掃描，發現代碼庫有依賴過時風險，需自動修復。",
                "urgency": 1
            }
            
            # v2.1：拆解
            decomposition = decompose_task(fake_payload)
            # v2.3：估價
            price = calculate_dynamic_price(decomposition, fake_payload.get("urgency", 1))
            # v2.2：並行執行
            results = schedule_tasks(decomposition["subtasks"])
            
            # 存入狀態（模擬）
            print(f"[AI 自主完成] 任務 '{fake_payload['title']}' 完成，系統估價 {price['price_ntd']} NTD")
            # 將此成績放入進化引擎
            from evolution.self_evolve import log_performance
            log_performance(price['price_ntd'], 1, time.time() % 3600)

def start_perception_loop(app_state):
    t = threading.Thread(target=ai_perception_loop, args=(app_state,))
    t.daemon = True
    t.start()
    return t

def stop_perception_loop():
    _stop_event.set()
