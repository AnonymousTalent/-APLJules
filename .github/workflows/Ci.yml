from runtime.worker_pool import run_parallel

def schedule_tasks(subtasks):
    mapped_tasks = []

    for t in subtasks:
        mapped_tasks.append({
            "task": t,
            "agent": choose_agent(t["task"])
        })

    results = run_parallel(mapped_tasks)

    return results


def choose_agent(task_text):
    if "API" in task_text:
        return "backend"
    if "UI" in task_text:
        return "frontend"
    if "deploy" in task_text:
        return "devops"
    return "ai"


