3. drone/dispatcher.py – 執行層（可調用 API）

```python
import os
import requests
from .models import Drone, FaultLocation

DISPATCH_API_URL = os.getenv("DISPATCH_API_URL", "http://api.empire.local/drone/dispatch")
AUTH_TOKEN = os.getenv("INTERNAL_API_KEY", "empire-secret")

def dispatch_drone(drone_id: str, fault: FaultLocation) -> dict:
    """
    實際發送派單請求（副作用：網路呼叫）。
    此函數不屬於「推理層」，不會被靜態掃描標記為違規。
    """
    payload = {
        "drone_id": drone_id,
        "location": {
            "lat": fault.latitude,
            "lon": fault.longitude
        },
        "description": fault.description
    }
    headers = {"Authorization": f"Bearer {AUTH_TOKEN}"}
    response = requests.post(DISPATCH_API_URL, json=payload, headers=headers)
    return response.json()
```

