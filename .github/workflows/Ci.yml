```python
from celery import Celery
import time

# 指定 Redis 作為 Broker 與 Result Backend
app = Celery('factory', broker='redis://redis:6379/0', backend='redis://redis:6379/0')

@app.task
def execute_subtask(task_data: dict):
    """
    真正的 Worker 執行單元
    """
    agent_type = task_data.get('agent')
    task_name = task_data.get('name')
    
    # 模擬執行工作
    print(f"🤖 [{agent_type}] 正在執行: {task_name}")
    time.sleep(2) # 模擬耗時
    
    return {
        "agent": agent_type,
        "task": task_name,
        "status": "completed",
        "cost": 100  # 後面 v2.3 動態定價會用到
    }
```

