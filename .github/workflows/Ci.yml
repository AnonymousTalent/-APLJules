🧠 第二步：讓 AI 學會「自我進化」 (evolution/self_evolve.py)

AI 開始記錄每次執行的績效，並回饋給系統的參數。

```python
import json
import os

EVOLVE_DB = "evolve_db.json"

def load_db():
    if not os.path.exists(EVOLVE_DB):
        return {"history": [], "weights": {"complexity_weight": 1.3, "base_rate": 350}}
    with open(EVOLVE_DB, "r") as f:
        return json.load(f)

def save_db(db):
    with open(EVOLVE_DB, "w") as f:
        json.dump(db, f, indent=2)

def log_performance(estimated_price, urgency, actual_cost):
    """記錄實際執行結果，並動態調整下一次的定價策略"""
    db = load_db()
    
    # 1. 記錄歷史
    db["history"].append({
        "estimated": estimated_price,
        "actual_cost": actual_cost,
        "urgency": urgency,
        "timestamp": time.time()
    })
    
    # 2. 計算偏差率 (若實際成本總是高於估價，代表評估太樂觀)
    if len(db["history"]) > 5:
        # 取最近5次數據
        recent = db["history"][-5:]
        avg_diff = sum((h["estimated"] - h["actual_cost"]) for h in recent) / len(recent)
        
        # ⭐ 動態自我進化：調整基礎單價
        if avg_diff < 0:
            # 賠錢了，下個任務自動漲價 (漲 10 塊)
            db["weights"]["base_rate"] += 10
            print(f"[AI 進化] 長期預估低於實際成本，自動將基礎時薪調漲至 {db['weights']['base_rate']} NTD")
        elif avg_diff > 100:
            # 賺太多，下個任務降價促銷 (降 5 塊)
            db["weights"]["base_rate"] -= 5
            print(f"[AI 進化] 預估過高，自動將基礎時薪調降至 {db['weights']['base_rate']} NTD")
            
    save_db(db)
    return db["weights"]
```

