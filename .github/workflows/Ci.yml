5. scripts/auto_dispatch_loop.py – 自動化循環（供 cron 呼叫）

```python
#!/usr/bin/env python3
"""
由定時任務（cron / GitHub Actions）執行：
偵測故障 → 選取無人機 → 派單（僅內部）。
"""
import logging
from drone.drone_selector import select_best_drone
from drone.dispatcher import dispatch_drone
from monitor.fault_detector import get_recent_faults

# 無人機資料庫（應從真實來源載入）
AVAILABLE_DRONES = [
    {"id": "DRONE-07", "lat": 24.14, "lon": 121.68, "status": "available"},
    {"id": "DRONE-12", "lat": 24.15, "lon": 121.70, "status": "available"},
    # ...
]

def main():
    faults = get_recent_faults()
    for fault in faults:
        drone_id = select_best_drone(AVAILABLE_DRONES, fault)
        if drone_id:
            result = dispatch_drone(drone_id, fault)
            logging.info(f"派單成功: {result}")
        else:
            logging.warning(f"無可用無人機處理故障: {fault.description}")

if __name__ == "__main__":
    main()
```

