🧠 步驟三：DAG 調度引擎 (core/dag_executor.py)

這會把 v2.1 產生的 depends_on 變成真正的 Celery 鏈（Chain）與群組（Group），實現自動化流水線。

```python
from core.celery_app import execute_subtask

def schedule_dag(task_graph: dict):
    """
    根據 DAG 進行拓撲排序並調度 Celery 任務
    """
    subtasks = task_graph["subtasks"]
    task_map = {t["id"]: t for t in subtasks}
    task_results = {}
    celery_tasks = []

    # 1. 將任務依照依賴順序分層（簡單版：無依賴的任務先跑）
    # 實際生產可用 NetworkX 做真正的拓撲排序
    pending_tasks = subtasks[:]
    executed = set()

    while pending_tasks:
        current_tasks = []
        for t in pending_tasks[:]:
            # 檢查依賴是否已完成
            if all(dep in executed for dep in t["depends_on"]):
                current_tasks.append(t)
                pending_tasks.remove(t)
        
        # 2. 這一層的任務可以並行執行 (Celery Group)
        if current_tasks:
            group_tasks = []
            for t in current_tasks:
                # 派發給對應 Agent
                agent = assign_agent(t["name"])
                task_payload = {"name": t["name"], "agent": agent}
                
                # 標記執行，並加入 Celery Group
                executed.add(t["id"])
                # ⭐️ 將任務轉換為 Celery Signature
                group_tasks.append(execute_subtask.s(task_payload))
            
            # 加入執行鍊
            if group_tasks:
                celery_tasks.append(group_tasks) # 這裡實際會用 group(...)

    # 實際執行鏈 (簡化版 - 直接觸發第一波)
    from core.celery_app import app
    from celery import group

    # 計算拓撲排序後的第一波執行
    first_wave = [execute_subtask.s({"name": t["name"], "agent": assign_agent(t["name"])}) 
                  for t in subtasks if not t["depends_on"]]
    
    if first_wave:
        job = group(first_wave)()
        return {"status": "dispatched", "group_id": job.id}
    
    return {"status": "no_tasks"}

def assign_agent(task_name: str) -> str:
    if "API" in task_name or "DB" in task_name:
        return "backend_agent"
    if "UI" in task_name:
        return "frontend_agent"
    return "devops_agent"
```

