2. drone/drone_selector.py – 純函數推理（符合規則）

```python
import math
from typing import List, Optional
from .models import Drone, FaultLocation

def select_best_drone(drones: List[Drone], fault: FaultLocation) -> Optional[str]:
    """
    純函數：根據故障位置，選出最近的可用無人機。
    無 I/O、無副作用。
    """
    available = [d for d in drones if d.status == "available"]
    if not available:
        return None

    def distance(drone: Drone) -> float:
        return math.hypot(drone.latitude - fault.latitude,
                          drone.longitude - fault.longitude)

    best = min(available, key=distance)
    return best.id
```

